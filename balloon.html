<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Collection | Bhagwan Decoration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="logo">
                <span class="brand">Bhagwan <span class="gold-text">Decor</span></span>
            </div>
            <div style="width: 22px;"></div> </div>
    </header>

    <main>
        <h2 class="section-title">Balloon Collection</h2> 

        <section class="card-grid">
            <div class="card pink-bg">
                <img src="images/p1.jpg" class="grid-img" alt="Lemon">
                <h4>LEMON</h4>
            </div>

            <div class="card purple-bg">
                <img src="images/p2.jpg" class="grid-img" alt="Sky Blue">
                <h4>SKY BLUE</h4>
            </div>

            <div class="card purple-bg">
                <img src="images/p3.jpg" class="grid-img" alt="Lavender">
                <h4>LAVENDER</h4>
            </div>

            <div class="card pink-bg">
                <img src="images/p4.jpg" class="grid-img" alt="Peach">
                <h4>PEACH</h4>
            </div>

            <div class="card pink-bg">
                <img src="images/p5.jpg" class="grid-img" alt="L.Green">
                <h4>L.GREEN</h4>
            </div>

            <div class="card purple-bg">
                <img src="images/p6.jpg" class="grid-img" alt="Rose Pink">
                <h4>ROSE PINK</h4>
            </div>

            <div class="card purple-bg">
                <img src="images/p7.jpg" class="grid-img" alt="Mango">
                <h4>MANGO</h4>
            </div>

            <div class="card pink-bg">
                <img src="images/p8.jpg" class="grid-img" alt="D.Green">
                <h4>D.GREEN</h4>
            </div>

            <div class="card pink-bg">
                <img src="images/p9.jpg" class="grid-img" alt="Voilet">
                <h4>VOILET</h4>
            </div>

            <div class="card purple-bg">
                <img src="images/p10.jpg" class="grid-img" alt="Brown">
                <h4>BROWN</h4>
            </div>

            <div class="card purple-bg">
                <img src="images/p11.jpg" class="grid-img" alt="Grey">
                <h4>GREY</h4>
            </div>
        </section>
    </main>

    <footer style="height: 60px;"></footer>

</body>
</html>
