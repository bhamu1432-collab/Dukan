<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candle Collection | Bhagwan Decoration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="logo">
                <span class="brand">Bhagwan <span class="gold-text">Decor</span></span>
            </div>
            <div style="width:24px;"></div> </div>
    </header>

    <main>
        <div class="promo-banner">
            <p>Elegant Candles for Your Special Occasions</p>
        </div>

        <h2 class="section-title">Candle Collection</h2>
        
        <section class="card-grid">
            <div class="card pink-bg">
                <img src="candle/c1.jpg" class="grid-img" alt="c1">
                <h4>MAGIC CANDLE</h4>
            </div>
            <div class="card purple-bg">
                <img src="candle/c2.jpg" class="grid-img" alt="c2">
                <h4>c2</h4>
            </div>
            <div class="card purple-bg">
                <img src="candle/c3.jpg" class="grid-img" alt="c3">
                <h4>c3</h4>
            </div>
            <div class="card pink-bg">
                <img src="candle/c4.jpg" class="grid-img" alt="c4">
                <h4>c4</h4>
            </div>
            <div class="card pink-bg">
                <img src="candle/c5.jpg" class="grid-img" alt="c5">
                <h4>c5</h4>
            </div>
            <div class="card purple-bg">
                <img src="candle/c6.jpg" class="grid-img" alt="c6">
                <h4>c6</h4>
            </div>
        </section>
    </main>

    <div style="height: 50px;"></div>

    <script src="script.js"></script>

</body>
</html>
