<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag Collection | Bhagwan Decoration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="logo"><span class="brand">Bhagwan <span class="gold-text">Decor</span></span></div>
            <div style="width:22px;"></div>
        </div>
    </header>

    <main>
        <div class="promo-banner">
            <p>Traditional & Decorative Flags for Your Celebration</p>
        </div>

        <h2 class="section-title">Flag Collection</h2>
        
        <section class="card-grid">
            <div class="card pink-bg"><img src="flags/f1.jpg" class="grid-img"><h4>f1</h4></div>
            <div class="card purple-bg"><img src="flags/f2.jpg" class="grid-img"><h4>f2</h4></div>
            <div class="card purple-bg"><img src="flags/f3.jpg" class="grid-img"><h4>f3</h4></div>
            <div class="card pink-bg"><img src="flags/f4.jpg" class="grid-img"><h4>f4</h4></div>
            <div class="card pink-bg"><img src="flags/f5.jpg" class="grid-img"><h4>f5</h4></div>
            <div class="card purple-bg"><img src="flags/f6.jpg" class="grid-img"><h4>f6</h4></div>
            <div class="card purple-bg"><img src="flags/f7.jpg" class="grid-img"><h4>f7</h4></div>
            <div class="card pink-bg"><img src="flags/f8.jpg" class="grid-img"><h4>f8</h4></div>
        </section>
    </main>

    <div style="height: 40px;"></div>

    <script src="script.js"></script>
</body>
</html>
