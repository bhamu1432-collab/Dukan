<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhagwan Decoration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- Sidebar -->
<div class="sidebar" id="menu">
  <h2>🎉 Menu</h2>
  <a href="#">🏠 Home</a>
  <a href="#">🎂 Birthdays</a>
  <a href="#">🎊 Occasions</a>
  <a href="#">🎈 Supplies</a>
  <a href="#">📞 Contact</a>
</div>

<!-- Header -->
<header class="header">
  <div class="menu-icon" onclick="toggleMenu()">☰</div>

  <h1 class="logo">🕯️ BHAGWAN DECORATION 🎉</h1>

  <div class="right-section">
    <a href="https://maps.app.goo.gl/kowZwrh6wegwQPHMA" target="_blank" class="location">
      📍 Hyderabad
    </a>
    <span class="icons">🔍 🛒</span>
  </div>

  <!-- Balloons -->
  <div class="balloons">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Sparkles -->
  <div class="sparkles">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<!-- Banner -->
<section class="banner">
  <img src="https://via.placeholder.com/400x200" alt="">
  <button>Buy Now</button>
</section>

<!-- Categories -->
<section class="categories">
  <div class="cat">
    <img src="https://via.placeholder.com/100">
    <p>Party Kits</p>
  </div>
  <div class="cat">
    <img src="https://via.placeholder.com/100">
    <p>Balloons</p>
  </div>
  <div class="cat">
    <img src="https://via.placeholder.com/100">
    <p>Banners</p>
  </div>
</section>

<!-- Products -->
<section class="products">

  <div class="card" onclick="openProduct('Decoration Box','₹500')">
    <img src="https://via.placeholder.com/150">
    <h3>Decoration Box</h3>
    <p>₹500</p>
  </div>

  <div class="card" onclick="openProduct('Birthday Kit','₹399')">
    <img src="https://via.placeholder.com/150">
    <h3>Birthday Kit</h3>
    <p>₹399</p>
  </div>

  <div class="card" onclick="openProduct('Balloon Set','₹199')">
    <img src="https://via.placeholder.com/150">
    <h3>Balloon Set</h3>
    <p>₹199</p>
  </div>

  <div class="card" onclick="openProduct('Banner Pack','₹99')">
    <img src="https://via.placeholder.com/150">
    <h3>Banner Pack</h3>
    <p>₹99</p>
  </div>

</section>

<!-- Product Popup -->
<div class="product-popup" id="popup">
  <div class="popup-content">
    <h2 id="pname"></h2>
    <p id="pprice"></p>

    <button onclick="orderNow()">Order Now</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
