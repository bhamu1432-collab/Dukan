<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhagwan Decoration | Home</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    <div class="top-bar">
        <i class="fas fa-bars menu-icon" onclick="openNav()"></i>

        <div class="logo">
            <span class="brand">Bhagwan <span class="gold-text">Decoration</span></span>
        </div>

        <a href="#" style="text-decoration: none;">
            <div class="location-box"><i class="fas fa-map-marker-alt"></i> Hyderabad</div>
        </a>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search products...">
        <i class="fas fa-search"></i>
    </div>
</header>

<div id="mySidebar" class="sidebar">
    <div class="sidebar-header">
        <span class="brand">Menu</span>
        <i class="fas fa-times menu-icon" onclick="closeNav()"></i>
    </div>
</div>

<div id="overlay" class="overlay" onclick="closeNav()"></div>

<main>

<div class="promo-banner reveal">
    <p>Premium decor for your celestial moments</p>
</div>

<h2 class="section-title reveal">Our Collections</h2>

<section class="card-grid reveal">

<a href="#" class="card-link">
<div class="card pink-bg">
<img src="https://picsum.photos/300/200?1" class="grid-img">
<h4>Balloon</h4>
</div>
</a>

<a href="#" class="card-link">
<div class="card purple-bg">
<img src="https://picsum.photos/300/200?2" class="grid-img">
<h4>Backdrop</h4>
</div>
</a>

<a href="#" class="card-link">
<div class="card purple-bg">
<img src="https://picsum.photos/300/200?3" class="grid-img">
<h4>Wedding</h4>
</div>
</a>

<a href="#" class="card-link">
<div class="card pink-bg">
<img src="https://picsum.photos/300/200?4" class="grid-img">
<h4>Events</h4>
</div>
</a>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
