<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhagwan Decoration | Premium Decor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <i class="fas fa-bars menu-icon" onclick="openNav()"></i>
            <div class="logo">
                <span class="brand">Bhagwan <span class="gold-text">Decoration</span></span>
            </div>
            <div class="location">
                <i class="fas fa-map-marker-alt"></i> Hyderabad
            </div>
        </div>
        <div class="search-box">
            <input type="text" placeholder="What are u looking for ?">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <div id="mySidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Bhagwan Decor</h3>
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        </div>
        <div class="sidebar-links">
            <a href="#"><span class="num">1</span> <i class="fas fa-home"></i> HOME</a>
            <a href="#"><span class="num">2</span> <i class="fas fa-layer-group"></i> Hanging</a>
            <a href="#"><span class="num">3</span> <i class="fas fa-flag"></i> FLAG</a>
            <a href="#"><span class="num">4</span> <i class="fas fa-border-all"></i> RANGOLI</a>
            <a href="#"><span class="num">5</span> <i class="fas fa-door-open"></i> TORAN</a>
            <a href="#"><span class="num">6</span> <i class="fas fa-spa"></i> MALA</a>
            <hr class="gold-line">
            <a href="#" class="contact-btn"><i class="fas fa-phone-alt"></i> CONTACT</a>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeNav()"></div>

    <main>
        <section class="circle-nav">
            <div class="circle-item">
                <div class="icon-circle pink-bg"><i class="fas fa-star gold-text"></i></div>
                <p>Hanging</p>
            </div>
            <div class="circle-item">
                <div class="icon-circle purple-bg"><i class="fas fa-om gold-text"></i></div>
                <p>Toran</p>
            </div>
            <div class="circle-item">
                <div class="icon-circle pink-bg"><i class="fas fa-leaf gold-text"></i></div>
                <p>Mala</p>
            </div>
            <div class="circle-item">
                <div class="icon-circle purple-bg"><i class="fas fa-sun gold-text"></i></div>
                <p>Rangoli</p>
            </div>
        </section>

        <div class="promo-banner">
            <p>Premium decor for your celestial moments</p>
        </div>

        <h2 class="section-title">Our Collections</h2>
        <section class="card-grid">
            <div class="card pink-bg">
                <div class="img-placeholder"></div>
                <h4>Wedding Decor</h4>
            </div>
            <div class="card purple-bg">
                <div class="img-placeholder"></div>
                <h4>Festival Special</h4>
            </div>
            <div class="card purple-bg">
                <div class="img-placeholder"></div>
                <h4>Birthday Decor</h4>
            </div>
            <div class="card pink-bg">
                <div class="img-placeholder"></div>
                <h4>Pooja Setup</h4>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
