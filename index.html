<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhagwan Decoration | Premium Decor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <i class="fas fa-bars menu-icon" onclick="openNav()"></i>
            <div class="logo">
                <span class="brand">Bhagwan <span class="gold-text">Decoration</span></span>
            </div>
            <a href="https://maps.app.goo.gl/bXgXdBEVMtKdBB9u6" target="_blank" class="location-link">
                <div class="location-box">
                    <i class="fas fa-map-marker-alt"></i> Hyderabad
                </div>
            </a>
        </div>
        <div class="search-box">
            <input type="text" placeholder="What are u looking for ?">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <div id="mySidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
        </div>
        <div class="sidebar-links">
            <a href="#" onclick="closeNav()"><span class="num">1</span> <i class="fas fa-home"></i> HOME</a>
            <a href="#hanging" onclick="closeNav()"><span class="num">2</span> <i class="fas fa-certificate"></i> Hanging</a>
            <a href="#flag" onclick="closeNav()"><span class="num">3</span> <i class="fas fa-flag"></i> FLAG</a>
            <a href="#rangoli" onclick="closeNav()"><span class="num">4</span> <i class="fas fa-palette"></i> RANGOLI</a>
            <a href="#toran" onclick="closeNav()"><span class="num">5</span> <i class="fas fa-archway"></i> TORAN</a>
            <a href="#mala" onclick="closeNav()"><span class="num">6</span> <i class="fas fa-spa"></i> MALA</a>
            <hr class="gold-line">
            <a href="#contact" class="contact-btn" onclick="closeNav()"><i class="fas fa-phone-alt"></i> CONTACT</a>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeNav()"></div>

    <main>
        <div class="promo-banner">
            <p>Premium decor for your celestial moments</p>
        </div>

        <h2 class="section-title">Our Collections</h2>
        <section class="card-grid">
            <div class="card pink-bg"><div class="img-placeholder"></div><h4>1 BALLOON</h4></div>
            <div class="card purple-bg"><div class="img-placeholder"></div><h4>2 CANDLE</h4></div>
            <div class="card purple-bg"><div class="img-placeholder"></div><h4>3 BACKDROP</h4></div>
            <div class="card pink-bg"><div class="img-placeholder"></div><h4>4 CURTAIN</h4></div>
            <div class="card pink-bg"><div class="img-placeholder"></div><h4>5 LEDs</h4></div>
            <div class="card purple-bg"><div class="img-placeholder"></div><h4>6 CAKE TOPER</h4></div>
            <div class="card purple-bg"><div class="img-placeholder"></div><h4>7 WEDDING</h4></div>
            <div class="card pink-bg"><div class="img-placeholder"></div><h4>8 EVENTS</h4></div>
            <div class="card pink-bg"><div class="img-placeholder"></div><h4>9 PAPER BANNER</h4></div>
            <div class="card purple-bg"><div class="img-placeholder"></div><h4>10 FOILS</h4></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
